name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Flutter 3.27.4
        run: |
          git clone https://github.com/flutter/flutter.git \
            --depth 1 --branch 3.27.4 $HOME/flutter
          echo "$HOME/flutter/bin" >> $GITHUB_PATH
          $HOME/flutter/bin/flutter --version

      - name: Install Android NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.0.12077973"

      - name: Flutter pub get
        run: flutter pub get

      - name: Remove GeneratedPluginRegistrant
        run: find . -name "GeneratedPluginRegistrant.java" -delete

      - name: Flutter analyze
        run: flutter analyze lib/ --no-fatal-infos

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-arm64
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30
