name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'

      - name: Install Android NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.0.12077973"

      - name: Flutter pub get
        run: flutter pub get

      - name: Patch Flutter v1 check
        run: |
          FLUTTER_PATH=$(which flutter)
          FLUTTER_DIR=$(dirname $(dirname $FLUTTER_PATH))
          PROJECT_DART="$FLUTTER_DIR/packages/flutter_tools/lib/src/project.dart"
          echo "Flutter path: $PROJECT_DART"
          if [ -f "$PROJECT_DART" ]; then
            sed -i "s/throwToolExit('Build failed due to use of deleted Android v1 embedding.', exitCode: 1)/return/" "$PROJECT_DART"
            echo "Patched successfully"
          else
            echo "File not found"
          fi

      - name: Remove GeneratedPluginRegistrant
        run: find . -name "GeneratedPluginRegistrant.java" -delete

      - name: Flutter analyze
        run: flutter analyze lib/ --no-fatal-infos

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-arm64
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30
