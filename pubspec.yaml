name: mon_application
description: Nouvelle application Flutter

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  go_router:          ^14.0.0
  sqflite:            ^2.3.0
  path:               ^1.9.0
  audioplayers:       ^6.0.0
  record:             5.0.4
  permission_handler: ^11.0.0
  uuid:               ^4.4.0
  image_picker:       ^1.0.0
  path_provider:      ^2.1.0
  http:               ^1.2.0
  connectivity_plus:  ^6.0.0
  shared_preferences: ^2.2.0
  signature:          ^5.5.0

dependency_overrides:
  record_linux:
    git:
      url: https://github.com/llfbandit/record.git
      path: record_linux
      ref: master

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/img/
