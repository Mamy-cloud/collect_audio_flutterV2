name: collect_audio_flutter
description: Application de collecte de témoignages oraux

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  go_router:          ^14.0.0
  sqflite:            ^2.3.0
  path:               ^1.9.0
  audioplayers:       ^6.0.0
  flutter_sound:      ^9.0.0
  permission_handler: ^11.0.0
  uuid:               ^4.4.0
  image_picker:       ^1.0.0
  path_provider:      ^2.1.0
  http:               ^1.2.0
  connectivity_plus:  ^6.0.0
  shared_preferences: ^2.2.0
  signature:          ^5.5.0
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/img/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
